{% set status = source.processing_status.value if source.processing_status else "pending" %}
{% if status == "completed" %}
  <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 shrink-0">
    Done
  </span>
{% elif status == "processing" %}
  <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700 shrink-0"
        hx-get="/sources/feed"
        hx-trigger="every 5s"
        hx-target="#source-list"
        hx-swap="innerHTML">
    Processing…
  </span>
{% elif status == "failed" %}
  <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700 shrink-0">
    Failed
  </span>
{% else %}
  <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600 shrink-0">
    Queued
  </span>
{% endif %}
