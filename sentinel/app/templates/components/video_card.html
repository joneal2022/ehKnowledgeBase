<div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
  <div class="flex items-start justify-between gap-4">
    <div class="flex-1 min-w-0">
      <h3 class="font-semibold text-base truncate">
        {{ source.title or source.original_title or "Processing…" }}
      </h3>
      {% if source.url %}
        <a href="{{ source.url }}" target="_blank" rel="noopener"
           class="text-xs text-gray-400 hover:text-indigo-500 truncate block mt-0.5">
          {{ source.url }}
        </a>
      {% endif %}
    </div>
    {% include "components/processing_status.html" %}
  </div>

  {% if source.author %}
    <p class="text-xs text-gray-500 mt-2">{{ source.author }}</p>
  {% endif %}
</div>
