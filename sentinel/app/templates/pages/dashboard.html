{% extends "base.html" %}

{% block title %}Dashboard — Sentinel{% endblock %}

{% block content %}

<!-- Add Video -->
<section class="mb-8">
  <h1 class="text-2xl font-bold mb-4">Add Video</h1>
  <form hx-post="/api/sources/youtube"
        hx-target="#add-result"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) { this.reset(); htmx.trigger('#source-list', 'refreshSources') }"
        class="flex gap-3">
    <input type="url"
           name="url"
           placeholder="https://www.youtube.com/watch?v=..."
           required
           class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    <button type="submit"
            class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
      Add Video
    </button>
  </form>
  <div id="add-result" class="mt-2 text-sm"></div>
</section>

<!-- Source list -->
<section>
  <h2 class="text-xl font-semibold mb-4">Videos</h2>
  <div id="source-list"
       hx-get="/sources/feed"
       hx-trigger="load, refreshSources from:body"
       hx-swap="innerHTML">
    <!-- populated by HTMX -->
  </div>
</section>

{% endblock %}
